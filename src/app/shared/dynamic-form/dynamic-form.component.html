<div class="dynamic-form" *ngIf="config">
  <div class="card">
    <h2 class="title">{{ config.title }}</h2>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="fields">
        <ng-container *ngFor="let field of config.fields">
          <!-- Array Field -->
          <div *ngIf="field.type === 'array'" class="field array-field">
            <div class="array-header">
              <label class="label">
                {{ field.label }}
                <span class="required-asterisk" *ngIf="isFieldRequired(field)">*</span>
              </label>
              <button type="button" class="btn secondary" (click)="addArrayItem(field)">
                {{ field.addButtonText || 'Add' }}
              </button>
            </div>

            <div class="array-items" [formArrayName]="field.key">
              <div
                class="array-item"
                *ngFor="let itemGroup of getArray(field.key).controls; let i = index"
                [formGroupName]="i"
              >
                <div class="array-item-top">
                  <div class="array-item-title">
                    {{ field.itemLabel || 'Item' }} {{ i + arrayStartIndex }}
                  </div>
                  <button
                    type="button"
                    class="btn danger"
                    (click)="removeArrayItem(field, i)"
                  >
                    {{ field.removeButtonText || 'Remove' }}
                  </button>
                </div>

                <div class="grid">
                  <ng-container *ngFor="let child of field.fields">
                    <div class="field">
                      <label class="label" [for]="field.key + '_' + i + '_' + child.key">
                        {{ child.label }}
                        <span class="required-asterisk" *ngIf="isFieldRequired(child)">*</span>
                      </label>

                      <!-- child: select -->
                      <ng-container *ngIf="child.type === 'select'; else childInput">
                        <ng-container *ngIf="(selectOptions$(child.options) | async) as options">
                          <div class="select-shell" (click)="$event.stopPropagation()">
                            <button
                              type="button"
                              class="control select-trigger"
                              [id]="field.key + '_' + i + '_' + child.key"
                              [class.placeholder]="!(asFormGroup(itemGroup).get(child.key)?.value)"
                              (click)="toggleSelectMenu(selectKey(field.key + '_' + child.key, i), $event)"
                            >
                              <span>
                                {{ selectedOptionLabel(asFormGroup(itemGroup), child.key, options, child.placeholder || 'Select') }}
                              </span>
                              <span class="chevron" [class.open]="isSelectMenuOpen(selectKey(field.key + '_' + child.key, i))">▾</span>
                            </button>

                            <div class="select-menu" *ngIf="isSelectMenuOpen(selectKey(field.key + '_' + child.key, i))">
                              <button
                                type="button"
                                class="select-option placeholder-option"
                                (click)="chooseSelectOption(asFormGroup(itemGroup), child.key, '')"
                              >
                                {{ child.placeholder || 'Select' }}
                              </button>
                              <button
                                type="button"
                                class="select-option"
                                *ngFor="let opt of options"
                                (click)="chooseSelectOption(asFormGroup(itemGroup), child.key, opt.value)"
                              >
                                {{ opt.label }}
                              </button>
                            </div>
                          </div>
                        </ng-container>
                      </ng-container>

                      <!-- child: input -->
                      <ng-template #childInput>
                        <input
                          class="control"
                          [id]="field.key + '_' + i + '_' + child.key"
                          [type]="child.type"
                          [attr.min]="inputMin(child.type)"
                          [attr.max]="inputMax(child.type)"
                          [placeholder]="child.placeholder || ''"
                          [formControlName]="child.key"
                        />
                      </ng-template>

                      <ng-container *ngIf="fieldError(child, asFormGroup(itemGroup)) as err">
                        <div class="error">{{ err }}</div>
                      </ng-container>
                      <div class="error error-placeholder" *ngIf="!fieldError(child, asFormGroup(itemGroup))"></div>
                    </div>
                  </ng-container>
                </div>
              </div>
            </div>
          </div>

          <!-- Normal Field -->
          <div *ngIf="field.type !== 'array'" class="field">
            <label class="label" [for]="field.key">
              {{ field.label }}
              <span class="required-asterisk" *ngIf="isFieldRequired(field)">*</span>
            </label>

            <ng-container *ngIf="field.type === 'select'; else normalInput">
              <ng-container *ngIf="(selectOptions$(field.options) | async) as options">
                <div class="select-shell" (click)="$event.stopPropagation()">
                  <button
                    type="button"
                    class="control select-trigger"
                    [id]="field.key"
                    [class.placeholder]="!(asFormGroup(form).get(field.key)?.value)"
                    (click)="toggleSelectMenu(selectKey(field.key), $event)"
                  >
                    <span>{{ selectedOptionLabel(asFormGroup(form), field.key, options, field.placeholder || 'Select') }}</span>
                    <span class="chevron" [class.open]="isSelectMenuOpen(selectKey(field.key))">▾</span>
                  </button>

                  <div class="select-menu" *ngIf="isSelectMenuOpen(selectKey(field.key))">
                    <button
                      type="button"
                      class="select-option placeholder-option"
                      (click)="chooseSelectOption(asFormGroup(form), field.key, '')"
                    >
                      {{ field.placeholder || 'Select' }}
                    </button>
                    <button
                      type="button"
                      class="select-option"
                      *ngFor="let opt of options"
                      (click)="chooseSelectOption(asFormGroup(form), field.key, opt.value)"
                    >
                      {{ opt.label }}
                    </button>
                  </div>
                </div>
              </ng-container>
            </ng-container>

            <ng-template #normalInput>
              <input
                class="control"
                [id]="field.key"
                [type]="field.type"
                [attr.min]="inputMin(field.type)"
                [attr.max]="inputMax(field.type)"
                [placeholder]="field.placeholder || ''"
                [formControlName]="field.key"
              />
            </ng-template>

            <ng-container *ngIf="fieldError(field) as err">
              <div class="error">{{ err }}</div>
            </ng-container>
            <div class="error error-placeholder" *ngIf="!fieldError(field)"></div>
          </div>
        </ng-container>
      </div>

      <div class="actions" *ngIf="hasArrayItems()">
        <button type="submit" class="btn primary" [disabled]="placeOrderBusy">Submit</button>
      </div>
    </form>
  </div>
</div>
